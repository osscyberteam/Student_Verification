<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Student Verification</title>

    <!-- FAVICON -->
    <link rel="icon"
          type="image/png"
          href="./favicon.png">

    <link rel="shortcut icon"
          type="image/png"
          href="./favicon.png">

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;

            background:
            linear-gradient(
                135deg,
                #0f172a,
                #1e293b
            );
        }

        .container {
            width: 100%;
            max-width: 650px;

            background: white;

            padding: 35px;

            border-radius: 20px;

            box-shadow:
            0 20px 50px
            rgba(0,0,0,0.3);
        }

        /* LOGO */

        .logo {
            width: 65px;
            height: 65px;

            margin: 0 auto 15px;

            display: flex;
            justify-content: center;
            align-items: center;

            overflow: hidden;

            border-radius: 50%;

            background: #f1f5f9;

            border: 3px solid #2563eb;

            box-shadow:
            0 5px 15px
            rgba(37,99,235,0.2);
        }

        .logo img {
            width: 100%;
            height: 100%;

            object-fit: cover;
        }

        h1 {
            text-align: center;

            color: #0f172a;

            margin-bottom: 8px;

            font-size: 30px;
        }

        .subtitle {
            text-align: center;

            color: #64748b;

            margin-bottom: 30px;

            font-size: 16px;
        }

        /* SEARCH */

        .search-box {
            display: flex;

            gap: 10px;
        }

        input {
            flex: 1;

            padding: 15px;

            border:
            2px solid
            #cbd5e1;

            border-radius: 10px;

            font-size: 16px;

            outline: none;

            text-transform: uppercase;
        }

        input:focus {
            border-color:
            #2563eb;
        }

        .search-btn {
            padding:
            15px 25px;

            border: none;

            border-radius: 10px;

            background:
            #2563eb;

            color: white;

            font-size: 16px;

            font-weight: bold;

            cursor: pointer;

            min-width: 100px;
        }

        .search-btn:hover {
            background:
            #1d4ed8;
        }

        .search-btn:disabled {
            background: #94a3b8;

            cursor: not-allowed;
        }

        /* LOADING */

        .loading {
            display: none;

            text-align: center;

            margin-top: 20px;

            color:
            #2563eb;

            font-weight: bold;
        }

        .spinner {
            width: 25px;
            height: 25px;

            border:
            4px solid
            #dbeafe;

            border-top:
            4px solid
            #2563eb;

            border-radius: 50%;

            animation:
            spin 0.8s linear infinite;

            margin:
            0 auto 10px;
        }

        @keyframes spin {

            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }

        }

        /* ERROR */

        .error {
            display: none;

            margin-top: 20px;

            padding: 15px;

            border-radius: 10px;

            background:
            #fee2e2;

            color:
            #b91c1c;

            text-align: center;

            font-weight: bold;
        }

        /* STUDENT CARD */

        .student-card {
            display: none;

            margin-top: 25px;

            padding: 25px;

            background:
            #f8fafc;

            border-radius: 15px;

            border:
            1px solid
            #e2e8f0;
        }

        .student-header {
            text-align: center;

            margin-bottom: 25px;
        }

        .student-photo {
            width: 120px;
            height: 120px;

            border-radius: 50%;

            object-fit: cover;

            border:
            4px solid
            #2563eb;

            margin-bottom: 12px;
        }

        .student-name {
            font-size: 24px;

            font-weight: bold;

            color:
            #0f172a;
        }

        .verified {
            display: inline-block;

            margin-top: 8px;

            padding:
            6px 12px;

            background:
            #dcfce7;

            color:
            #15803d;

            border-radius: 20px;

            font-size: 13px;

            font-weight: bold;
        }

        /* INFORMATION */

        .info-grid {
            display: grid;

            grid-template-columns:
            1fr 1fr;

            gap: 12px;
        }

        .info-item {
            padding: 14px;

            background: white;

            border-radius: 10px;

            border:
            1px solid
            #e2e8f0;
        }

        .info-label {
            font-size: 12px;

            color:
            #64748b;

            margin-bottom: 5px;
        }

        .info-value {
            font-size: 15px;

            font-weight: bold;

            color:
            #1e293b;

            word-break: break-word;
        }

        .reg-number {
            grid-column:
            1 / -1;

            background:
            #eff6ff;

            border:
            1px solid
            #bfdbfe;
        }

        .reg-number .info-value {
            color:
            #1d4ed8;

            font-size: 17px;
        }

        /* MOBILE */

        @media(max-width:600px) {

            body {
                padding: 15px;
            }

            .container {
                padding:
                25px 18px;
            }

            h1 {
                font-size: 25px;
            }

            .search-box {
                flex-direction:
                column;
            }

            .search-btn {
                width: 100%;
            }

            .info-grid {
                grid-template-columns:
                1fr;
            }

            .reg-number {
                grid-column:
                auto;
            }

        }

    </style>

</head>


<body>


<div class="container">


    <!-- LOGO -->

    <div class="logo">

        <img
            src="./favicon.png"
            alt="OSS Cyber Academy Logo"
            onerror="
                this.style.display='none';
            "
        >

    </div>


    <h1>
        🛡️ Student Verification
    </h1>


    <p class="subtitle">
        OSS Cyber Academy
    </p>


    <!-- SEARCH -->

    <div class="search-box">

        <input
            type="text"
            id="regNumber"
            placeholder="Please enter Full Registration Number"
            autocomplete="off"
        >

        <button
            class="search-btn"
            id="searchBtn"
            onclick="searchStudent()"
        >
            Search
        </button>

    </div>


    <!-- LOADING -->

    <div
        class="loading"
        id="loading"
    >

        <div class="spinner"></div>

        Searching Student...

    </div>


    <!-- ERROR -->

    <div
        class="error"
        id="error"
    ></div>


    <!-- STUDENT RESULT -->

    <div
        class="student-card"
        id="studentCard"
    >

        <div
            class="student-header"
        >

            <img
                id="studentPhoto"
                class="student-photo"
                src="./favicon.png"
                alt="Student Photo"
                onerror="
                    this.src='./favicon.png'
                "
            >

            <div
                class="student-name"
                id="studentName"
            >
            </div>

            <div
                class="verified"
            >
                ✓ VERIFIED STUDENT
            </div>

        </div>


        <div
            class="info-grid"
            id="infoGrid"
        >
        </div>


    </div>


</div>



<script>


/* =====================================
   GOOGLE APPS SCRIPT API URL
===================================== */

const API_URL =
"https://script.google.com/macros/s/AKfycbzL-CJ1Lxvqxs8g8SH2LHbhAmBh51P3tQT3FRYitODCClGDdmJrBTwedYnOVCzw-69v/exec";


/* =====================================
   SEARCH STUDENT
===================================== */

function searchStudent() {

    const input =
    document.getElementById("regNumber");

    const loading =
    document.getElementById("loading");

    const error =
    document.getElementById("error");

    const card =
    document.getElementById("studentCard");

    const searchBtn =
    document.getElementById("searchBtn");


    const regNumber =
    input.value.trim().toUpperCase();


    /* RESET */

    error.style.display = "none";

    card.style.display = "none";


    /* EMPTY INPUT */

    if (!regNumber) {

        showError(
            "Please enter Registration Number."
        );

        return;

    }


    /* SHOW LOADING */

    loading.style.display = "block";

    searchBtn.disabled = true;

    searchBtn.innerText = "Searching...";


    /* API URL */

    const url =
    API_URL +
    "?reg=" +
    encodeURIComponent(regNumber);


    /* =====================================
       ABORT CONTROLLER
    ===================================== */

    const controller =
    new AbortController();


    const timeout =
    setTimeout(
        () => {

            controller.abort();

        },
        10000
    );


    /* =====================================
       FETCH API
    ===================================== */

    fetch(
        url,
        {
            method: "GET",

            signal:
            controller.signal,

            cache: "no-store"
        }
    )

    .then(
        response => {

            if (!response.ok) {

                throw new Error(
                    "HTTP Error: " +
                    response.status
                );

            }

            return response.json();

        }
    )

    .then(
        data => {

            clearTimeout(timeout);


            loading.style.display =
            "none";


            searchBtn.disabled =
            false;


            searchBtn.innerText =
            "Search";


            /* STUDENT FOUND */

            if (
                data &&
                data.success &&
                data.student
            ) {

                displayStudent(
                    data.student
                );

            }


            /* NOT FOUND */

            else {

                showError(

                    data.message ||

                    "No student data found."

                );

            }

        }
    )

    .catch(
        error => {

            clearTimeout(timeout);


            loading.style.display =
            "none";


            searchBtn.disabled =
            false;


            searchBtn.innerText =
            "Search";


            console.error(
                "API ERROR:",
                error
            );


            if (
                error.name ===
                "AbortError"
            ) {

                showError(
                    "Server response timed out. Please try again."
                );

            }

            else {

                showError(
                    "Unable to connect to database. Please try again."
                );

            }

        }
    );

}


/* =====================================
   DISPLAY STUDENT
===================================== */

function displayStudent(student) {

    const card =
    document.getElementById(
        "studentCard"
    );

    const name =
    document.getElementById(
        "studentName"
    );

    const photo =
    document.getElementById(
        "studentPhoto"
    );

    const grid =
    document.getElementById(
        "infoGrid"
    );


    /* NAME */

    name.innerText =
    student["Student Name"] ||
    "Student";


    /* PHOTO */

    photo.src =
    student["Student Photo"] ||
    "./favicon.png";


    /* CLEAR OLD DATA */

    grid.innerHTML = "";


    /* FIELDS */

    const fields = [

        {
            key: "Student Name",
            icon: "👤"
        },

        {
            key: "Registration Number",
            icon: "🆔"
        },

        {
            key: "Roll Number",
            icon: "🔢"
        },

        {
            key: "Date of Birth",
            icon: "📅"
        },

        {
            key: "Gender",
            icon: "⚧"
        },

        {
            key: "Blood Group",
            icon: "🩸"
        },

        {
            key: "Mobile",
            icon: "📱"
        },

        {
            key: "Email",
            icon: "📧"
        },

        {
            key: "Address",
            icon: "🏠"
        },

        {
            key: "Status",
            icon: "✅"
        }

    ];


    /* CREATE INFORMATION */

    fields.forEach(
        field => {

            const value =
            student[field.key];


            const item =
            document.createElement(
                "div"
            );


            item.className =
            "info-item";


            if (
                field.key ===
                "Registration Number"
            ) {

                item.classList.add(
                    "reg-number"
                );

            }


            item.innerHTML = `

                <div
                    class="info-label"
                >

                    ${field.icon}
                    ${escapeHTML(
                        field.key
                    )}

                </div>

                <div
                    class="info-value"
                >

                    ${escapeHTML(
                        value ||
                        "N/A"
                    )}

                </div>

            `;


            grid.appendChild(
                item
            );

        }
    );


    /* SHOW CARD */

    card.style.display =
    "block";

}


/* =====================================
   ERROR MESSAGE
===================================== */

function showError(message) {

    const error =
    document.getElementById(
        "error"
    );


    error.innerText =
    message;


    error.style.display =
    "block";

}


/* =====================================
   SECURITY
===================================== */

function escapeHTML(value) {

    return String(value)

    .replace(
        /&/g,
        "&amp;"
    )

    .replace(
        /</g,
        "&lt;"
    )

    .replace(
        />/g,
        "&gt;"
    )

    .replace(
        /"/g,
        "&quot;"
    )

    .replace(
        /'/g,
        "&#039;"
    );

}


/* =====================================
   ENTER KEY SEARCH
===================================== */

document
.getElementById("regNumber")
.addEventListener(
    "keydown",

    function(event) {

        if (
            event.key ===
            "Enter"
        ) {

            searchStudent();

        }

    }
);

</script>


</body>

</html>
